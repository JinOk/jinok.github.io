<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author.name }}">

  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-nav" id="top">
    <div class="nav-inner">
      <a class="nav-brand" href="#top">Jin Ok Yang</a>
      <nav>
        <a href="#about">About</a>
        <a href="#themes">Themes</a>
        <a href="#publications">Publications</a>
        <a href="#education">Education</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <strong>Jin Ok Yang, Ph.D.</strong><br>
        Principal Research Scientist<br>
        Korea Bioinformation Center (KOBIC), KRIBB
      </div>
      <div class="footer-links">
        <a href="mailto:joy@kribb.re.kr">joy@kribb.re.kr</a>
        <a href="{{ site.author.scholar }}" target="_blank" rel="noopener">Google Scholar</a>
        <a href="{{ site.author.kribb }}" target="_blank" rel="noopener">KRIBB Profile</a>
      </div>
      <div class="footer-meta">
        © {{ 'now' | date: '%Y' }} Jin Ok Yang · Built with Jekyll on GitHub Pages
      </div>
    </div>
  </footer>
</body>
</html>
