<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Structural Variants and Genome Assembly">
  <defs>
    <linearGradient id="svBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#svBg)"/>
  <!-- Reference chromosome -->
  <g>
    <rect x="14" y="28" width="68" height="10" rx="5" fill="#0d9488" opacity="0.85"/>
    <!-- Centromere indent -->
    <rect x="46" y="28" width="4" height="10" fill="#0f766e"/>
  </g>
  <!-- Variant chromosome with deletion + inversion + duplication -->
  <g>
    <rect x="14" y="56" width="22" height="10" rx="5" fill="#0f766e"/>
    <!-- inverted segment in different shade -->
    <rect x="38" y="56" width="14" height="10" rx="5" fill="#14b8a6"/>
    <path d="M40 58 L46 64 M46 58 L40 64" stroke="#fff" stroke-width="1.5"/>
    <!-- duplication marker -->
    <rect x="56" y="56" width="10" height="10" rx="5" fill="#0f766e"/>
    <rect x="68" y="56" width="10" height="10" rx="5" fill="#0f766e" opacity="0.6"/>
  </g>
  <!-- Connecting break-point lines -->
  <g stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2">
    <line x1="36" y1="38" x2="36" y2="56"/>
    <line x1="52" y1="38" x2="52" y2="56"/>
    <line x1="66" y1="38" x2="66" y2="56"/>
  </g>
  <!-- Telomere caps -->
  <circle cx="14" cy="33" r="4" fill="#0f172a"/>
  <circle cx="82" cy="33" r="4" fill="#0f172a"/>
  <circle cx="14" cy="61" r="4" fill="#0f172a"/>
  <circle cx="78" cy="61" r="4" fill="#0f172a"/>
</svg>
