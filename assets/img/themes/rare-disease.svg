<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Rare Disease Variant Analysis">
  <defs>
    <linearGradient id="rdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#rdBg)"/>
  <!-- Pedigree: square = male, circle = female. Filled = affected. -->
  <!-- Generation 1 -->
  <rect x="22" y="20" width="14" height="14" fill="none" stroke="#0f766e" stroke-width="2"/>
  <circle cx="67" cy="27" r="7" fill="none" stroke="#0f766e" stroke-width="2"/>
  <line x1="36" y1="27" x2="60" y2="27" stroke="#0f766e" stroke-width="1.5"/>
  <!-- Sibship line down -->
  <line x1="48" y1="27" x2="48" y2="44" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="32" y1="44" x2="64" y2="44" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="32" y1="44" x2="32" y2="50" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="48" y1="44" x2="48" y2="50" stroke="#0f766e" stroke-width="1.5"/>
  <line x1="64" y1="44" x2="64" y2="50" stroke="#0f766e" stroke-width="1.5"/>
  <!-- Generation 2: middle child affected (filled) -->
  <rect x="25" y="50" width="14" height="14" fill="none" stroke="#0f766e" stroke-width="2"/>
  <circle cx="48" cy="57" r="7" fill="#0d9488" stroke="#0f766e" stroke-width="2"/>
  <rect x="57" y="50" width="14" height="14" fill="none" stroke="#0f766e" stroke-width="2"/>
  <!-- Variant DNA snippet at bottom -->
  <g stroke="#0f766e" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="22" y1="80" x2="74" y2="80"/>
    <line x1="22" y1="84" x2="74" y2="84"/>
  </g>
  <!-- Variant marker (red-ish accent) -->
  <circle cx="48" cy="82" r="4" fill="#dc2626"/>
</svg>
