<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Public Bio-Data Infrastructure">
  <defs>
    <linearGradient id="biBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#biBg)"/>
  <!-- Database stack (cylinders) -->
  <g transform="translate(30 18)">
    <ellipse cx="18" cy="6" rx="18" ry="5" fill="#0d9488"/>
    <rect x="0" y="6" width="36" height="14" fill="#0d9488"/>
    <ellipse cx="18" cy="20" rx="18" ry="5" fill="#0f766e"/>
    <rect x="0" y="20" width="36" height="14" fill="#0d9488"/>
    <ellipse cx="18" cy="34" rx="18" ry="5" fill="#0f766e"/>
    <rect x="0" y="34" width="36" height="14" fill="#0d9488"/>
    <ellipse cx="18" cy="48" rx="18" ry="5" fill="#0f766e"/>
  </g>
  <!-- Connecting nodes -->
  <g fill="#0f172a">
    <circle cx="14" cy="76" r="4"/>
    <circle cx="48" cy="82" r="4"/>
    <circle cx="82" cy="76" r="4"/>
  </g>
  <g stroke="#0f172a" stroke-width="1.5" fill="none">
    <line x1="48" y1="68" x2="14" y2="76"/>
    <line x1="48" y1="68" x2="48" y2="78"/>
    <line x1="48" y1="68" x2="82" y2="76"/>
  </g>
</svg>
